<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BrickBuilder Kids - Fun Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.154.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.13.0?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.74.0?external=react,react-dom,three,@react-three/fiber",
        "three/examples/jsm/exporters/STLExporter.js": "https://esm.sh/three@0.154.0/examples/jsm/exporters/STLExporter.js",
        "three/examples/jsm/exporters/OBJExporter.js": "https://esm.sh/three@0.154.0/examples/jsm/exporters/OBJExporter.js",
        "three/examples/jsm/utils/BufferGeometryUtils.js": "https://esm.sh/three@0.154.0/examples/jsm/utils/BufferGeometryUtils.js"
      }
    }
  </script>
  <style>
    html, body, #root {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      font-family: Inter, system-ui, sans-serif;
    }
    canvas { touch-action: none; outline: none; }
    .safe-inset { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useEffect, useMemo, useRef, useState, Suspense } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Canvas, useFrame, useThree } from '@react-three/fiber';
    import { Environment, OrbitControls, RoundedBox } from '@react-three/drei';
    import * as THREE from 'three';
    import { STLExporter } from 'three/examples/jsm/exporters/STLExporter.js';
    import { OBJExporter } from 'three/examples/jsm/exporters/OBJExporter.js';
    import { mergeGeometries } from 'three/examples/jsm/utils/BufferGeometryUtils.js';

    const generateId = () => (crypto?.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
    const GRID_SIZE = 20;
    const SAVE_KEY = 'lego-build-v2';
    const INTRO_KEY = 'lego-intro-seen-v1';

    const PALETTE = ['#ef4444','#f97316','#eab308','#84cc16','#22c55e','#06b6d4','#3b82f6','#a855f7','#ec4899','#ffffff','#1e293b','#78350f'];
    const BRICK_TYPES = [
      { id: '1x1', label: '1x1', width: 1, depth: 1, emoji: '🔹' },
      { id: '1x2', label: '1x2', width: 1, depth: 2, emoji: '▬' },
      { id: '2x2', label: '2x2', width: 2, depth: 2, emoji: '◼️' },
      { id: '2x3', label: '2x3', width: 2, depth: 3, emoji: '▭' },
      { id: '2x4', label: '2x4', width: 2, depth: 4, emoji: '🧱' }
    ];
    const BRICK_BY_ID = Object.fromEntries(BRICK_TYPES.map((t) => [t.id, t]));

    const createRect = (w, h, d, x, y, z, color) => {
      const out = [];
      for (let i = 0; i < w; i++) for (let j = 0; j < h; j++) for (let k = 0; k < d; k++) out.push({ id: generateId(), position: [x + i, y + j, z + k], color, rotation: 0, type: '1x1', damage: 0 });
      return out;
    };

    const PRESETS = {
      'Empty Grid': [],
      'Cozy House': [
        ...createRect(10, 1, 10, -5, 0, -5, '#22c55e'),
        ...createRect(6, 3, 1, -3, 1, -3, '#f8fafc'),
        ...createRect(6, 3, 1, -3, 1, 2, '#f8fafc'),
        ...createRect(1, 3, 4, -3, 1, -2, '#f8fafc'),
        ...createRect(1, 3, 4, 2, 1, -2, '#f8fafc')
      ]
    };

    const materialProfiles = {
      plastic: { base: 420, wobble: 90, attack: 0.01, decay: 0.12 },
      wood: { base: 220, wobble: 50, attack: 0.005, decay: 0.16 },
      metal: { base: 650, wobble: 160, attack: 0.003, decay: 0.2 }
    };

    let sharedAudioContext = null;
    const getAudioContext = () => {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      if (!sharedAudioContext || sharedAudioContext.state === 'closed') sharedAudioContext = new Ctx();
      if (sharedAudioContext.state === 'suspended') sharedAudioContext.resume();
      return sharedAudioContext;
    };

    const isWithinGrid = (position, brickType, rotation = 0) => {
      const t = BRICK_BY_ID[brickType] || BRICK_TYPES[0];
      const turns = ((Math.round(rotation / (Math.PI / 2)) % 4) + 4) % 4;
      const rotated = turns % 2 === 1;
      const w = rotated ? t.depth : t.width;
      const d = rotated ? t.width : t.depth;
      const [x, y, z] = position;
      const min = -GRID_SIZE;
      const max = GRID_SIZE;
      return x >= min && z >= min && y >= 0 && x + w - 1 <= max && z + d - 1 <= max;
    };

    const playSound = (kind, enabled = true, profile = 'plastic', distanceFactor = 1) => {
      if (!enabled) return;
      try {
        const ctx = getAudioContext();
        if (!ctx) return;
        const now = ctx.currentTime;
        const vol = Math.max(0.015, 0.04 * distanceFactor);

        const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);

        const src = ctx.createBufferSource();
        src.buffer = noiseBuffer;
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        src.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        const p = materialProfiles[profile] || materialProfiles.plastic;
        filter.type = 'bandpass';
        filter.frequency.value = p.base + Math.random() * p.wobble;

        gain.gain.setValueAtTime(vol, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + (kind === 'punch' ? 0.2 : p.decay));
        src.start(now);
        src.stop(now + (kind === 'punch' ? 0.2 : p.decay));
      } catch (_) {}
    };

    const getFootprintCells = (brick) => {
      const type = BRICK_BY_ID[brick.type] || BRICK_TYPES[0];
      const turns = ((Math.round((brick.rotation || 0) / (Math.PI / 2)) % 4) + 4) % 4;
      const rotated = turns % 2 === 1;
      const w = rotated ? type.depth : type.width;
      const d = rotated ? type.width : type.depth;
      const [x, y, z] = brick.position;
      const cells = [];
      for (let i = 0; i < w; i++) for (let j = 0; j < d; j++) cells.push([x + i, y, z + j]);
      return cells;
    };

    const canPlaceBrick = (bricks, draft, ignoreId = null) => {
      if (!isWithinGrid(draft.position, draft.type, draft.rotation || 0)) return false;
      const occupied = new Set();
      bricks.forEach((b) => {
        if (ignoreId && b.id === ignoreId) return;
        getFootprintCells(b).forEach((c) => occupied.add(`${c[0]},${c[1]},${c[2]}`));
      });
      return getFootprintCells(draft).every((c) => !occupied.has(`${c[0]},${c[1]},${c[2]}`));
    };

    const BrickVisual = ({ brickType, color, rotation = 0, transparent = false, damaged = 0, ...events }) => {
      const type = BRICK_BY_ID[brickType] || BRICK_TYPES[0];
      const studs = useMemo(() => {
        const arr = [];
        for (let x = 0; x < type.width; x++) for (let z = 0; z < type.depth; z++) arr.push([x - (type.width - 1) / 2, z - (type.depth - 1) / 2]);
        return arr;
      }, [type]);

      return (
        <group rotation={[0, rotation, 0]}>
          <RoundedBox args={[type.width, 1, type.depth]} radius={0.08} smoothness={4} castShadow receiveShadow {...events}>
            <meshPhysicalMaterial color={color} roughness={0.28 + Math.min(damaged, 4) * 0.08} metalness={0.08} clearcoat={0.35} transparent={transparent} opacity={transparent ? 0.55 : 1} />
          </RoundedBox>
          {studs.map(([x, z]) => (
            <mesh key={`${x}-${z}`} position={[x, 0.58, z]} castShadow receiveShadow>
              <cylinderGeometry args={[0.22, 0.22, 0.16, 16]} />
              <meshStandardMaterial color={color} roughness={0.35} metalness={0.05} />
            </mesh>
          ))}
        </group>
      );
    };

    const buildMergedGeometry = (bricks) => {
      const geometries = [];
      bricks.forEach((brick) => {
        const t = BRICK_BY_ID[brick.type] || BRICK_TYPES[0];
        const base = new THREE.BoxGeometry(t.width, 1, t.depth);
        const mat = new THREE.Matrix4().makeRotationY(brick.rotation || 0);
        mat.setPosition(new THREE.Vector3(brick.position[0], brick.position[1] + 0.5, brick.position[2]));
        base.applyMatrix4(mat);
        geometries.push(base);

        for (let x = 0; x < t.width; x++) {
          for (let z = 0; z < t.depth; z++) {
            const stud = new THREE.CylinderGeometry(0.22, 0.22, 0.16, 16);
            const local = new THREE.Vector3(x - (t.width - 1) / 2, 1.08, z - (t.depth - 1) / 2).applyAxisAngle(new THREE.Vector3(0, 1, 0), brick.rotation || 0);
            const m = new THREE.Matrix4().setPosition(new THREE.Vector3(brick.position[0] + local.x, brick.position[1] + local.y, brick.position[2] + local.z));
            stud.applyMatrix4(m);
            geometries.push(stud);
          }
        }
      });
      if (!geometries.length) return null;
      return mergeGeometries(geometries, true);
    };

    const downloadFile = (content, filename, mime = 'text/plain') => {
      const blob = content instanceof Blob ? content : new Blob([content], { type: mime });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    };

    const SceneContent = ({ bricks, mode, hoverPos, setHoverPos, addBrick, removeBrick, moveBrick, activeColor, activeBrickType, rotation, screenshotTrigger, onScreenshotTaken, onCameraDirection, canPlaceCurrent }) => {
      const { gl, scene, camera } = useThree();
      const [draggingId, setDraggingId] = useState(null);
      useFrame(() => {
        if (!onCameraDirection) return;
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        onCameraDirection([dir.x, dir.y, dir.z]);
      });

      useEffect(() => {
        if (!screenshotTrigger) return;
        const size = gl.getSize(new THREE.Vector2());
        const prevPR = gl.getPixelRatio();
        const targetPR = Math.min(window.devicePixelRatio * 2, 3);
        gl.setPixelRatio(targetPR);
        gl.setSize(size.x, size.y, false);
        gl.render(scene, camera);
        const dataUrl = gl.domElement.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `lego-screenshot-${Date.now()}.png`;
        a.click();
        gl.setPixelRatio(prevPR);
        gl.setSize(size.x, size.y, false);
        onScreenshotTaken();
      }, [screenshotTrigger]);

      const updateHover = (e) => {
        e.stopPropagation();
        if (mode === 'delete') return setHoverPos(null);
        const p = e.point;
        if (mode === 'move' && draggingId) {
          moveBrick(draggingId, [Math.round(p.x), Math.max(0, Math.round(p.y)), Math.round(p.z)]);
          return;
        }

        let pos;
        if (e.object.geometry.type === 'PlaneGeometry') pos = [Math.round(p.x), 0, Math.round(p.z)];
        else {
          const n = e.face.normal;
          pos = [Math.round(p.x + n.x * 0.5), Math.max(0, Math.floor(p.y + n.y * 0.5)), Math.round(p.z + n.z * 0.5)];
        }
        setHoverPos(pos);
      };

      const handleCanvasClick = (e) => {
        e.stopPropagation();
        if (mode !== 'build' || !hoverPos) return;
        const draft = { position: hoverPos, color: activeColor, rotation, type: activeBrickType };
        if (canPlaceBrick(bricks, draft)) addBrick(draft);
      };

      return (
        <>
          <ambientLight intensity={0.72} />
          <directionalLight position={[8, 14, 7]} castShadow intensity={1.1} shadow-mapSize={[1024, 1024]} />
          <Suspense fallback={null}><Environment preset="park" blur={0.9} /></Suspense>

          {bricks.map((brick) => (
            <group key={brick.id} position={brick.position}>
              <BrickVisual
                brickType={brick.type}
                color={brick.color}
                damaged={brick.damage || 0}
                rotation={brick.rotation}
                onPointerDown={(e) => {
                  e.stopPropagation();
                  if (mode === 'delete') removeBrick(brick.id);
                  if (mode === 'move') setDraggingId(brick.id);
                }}
                onPointerUp={() => setDraggingId(null)}
                onPointerMove={updateHover}
              />
            </group>
          ))}

          {mode === 'build' && hoverPos && <group position={hoverPos}><BrickVisual brickType={activeBrickType} color={canPlaceCurrent ? activeColor : '#ef4444'} rotation={rotation} transparent /></group>}

          <mesh rotation={[-Math.PI / 2, 0, 0]} position={[0, -0.01, 0]} onPointerMove={updateHover} onPointerUp={() => setDraggingId(null)} onClick={handleCanvasClick} receiveShadow>
            <planeGeometry args={[50, 50]} />
            <meshStandardMaterial transparent opacity={0} />
          </mesh>
          <gridHelper args={[GRID_SIZE * 2, GRID_SIZE * 2, 0x9ca3af, 0xe5e7eb]} position={[0, 0.01, 0]} />

          <OrbitControls makeDefault minPolarAngle={0} maxPolarAngle={Math.PI / 2 - 0.1} enableDamping dampingFactor={0.08} />
        </>
      );
    };

    function App() {
      const [bricks, setBricks] = useState([]);
      const [hoverPos, setHoverPos] = useState(null);
      const [activeColor, setActiveColor] = useState(PALETTE[0]);
      const [activeBrickType, setActiveBrickType] = useState(BRICK_TYPES[0].id);
      const [rotation, setRotation] = useState(0);
      const [mode, setMode] = useState('build');
      const [soundEnabled, setSoundEnabled] = useState(true);
      const [activeMaterial, setActiveMaterial] = useState('plastic');
      const [screenshotTrigger, setScreenshotTrigger] = useState(false);
      const [showIntro, setShowIntro] = useState(localStorage.getItem(INTRO_KEY) !== '1');
      const [history, setHistory] = useState([]);
      const [future, setFuture] = useState([]);
      const [cameraDirection, setCameraDirection] = useState([0.7, 0.15, 0.6]);
      const [toast, setToast] = useState('Place your first brick to start your build!');

      useEffect(() => {
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed.bricks)) {
              const hydrated = parsed.bricks.map((b) => ({ ...b, id: b.id || generateId(), type: b.type || '1x1', rotation: b.rotation || 0, damage: b.damage || 0 }));
              setBricks(hydrated);
              setHistory([hydrated]);
              return;
            }
          }
        } catch (_) {}
        setHistory([[]]);
      }, []);


      useEffect(() => {
        if (!toast) return;
        const timer = setTimeout(() => setToast(''), 1800);
        return () => clearTimeout(timer);
      }, [toast]);

      const canPlaceCurrent = useMemo(() => {
        if (!hoverPos || mode !== 'build') return true;
        return canPlaceBrick(bricks, { position: hoverPos, color: activeColor, rotation, type: activeBrickType });
      }, [bricks, hoverPos, mode, activeColor, rotation, activeBrickType]);

      const objectiveProgress = Math.min(100, Math.round((bricks.length / 12) * 100));
      const objectiveLabel = bricks.length < 12 ? `Build to 12 bricks (${bricks.length}/12)` : `Great job! Keep experimenting (${bricks.length} bricks)`;

      const pushHistory = (next) => {
        setHistory((h) => [...h, JSON.parse(JSON.stringify(next))].slice(-120));
        setFuture([]);
      };

      const updateBricks = (next, soundKind = null) => {
        setBricks(next);
        pushHistory(next);
        if (soundKind) {
          const dist = Math.sqrt(bricks.length + 1);
          const distanceFactor = Math.max(0.35, Math.min(1, 5 / dist));
          playSound(soundKind, soundEnabled, activeMaterial, distanceFactor);
        }
      };

      const addBrick = (draft) => {
        if (!canPlaceBrick(bricks, draft)) return setToast('Can't place there. Try another spot.');
        updateBricks([...bricks, { ...draft, id: generateId(), damage: 0, material: activeMaterial }], 'snap');
      };
      const removeBrick = (id) => updateBricks(bricks.filter((b) => b.id !== id), 'delete');
      const moveBrick = (id, position) => {
        setBricks((prev) => {
          const target = prev.find((b) => b.id === id);
          if (!target) return prev;
          const draft = { ...target, position };
          if (!canPlaceBrick(prev, draft, id)) return prev;
          return prev.map((b) => (b.id === id ? draft : b));
        });
      };

      const commitMove = () => {
        pushHistory(bricks);
      };

      const undo = () => {
        if (history.length <= 1) return;
        const prev = history[history.length - 2];
        const current = history[history.length - 1];
        setFuture((f) => [current, ...f]);
        setHistory((h) => h.slice(0, -1));
        setBricks(prev);
      };

      const redo = () => {
        if (!future.length) return;
        const [next, ...rest] = future;
        setFuture(rest);
        setHistory((h) => [...h, next]);
        setBricks(next);
      };

      const punchAll = () => {
        const cam = new THREE.Vector3(...cameraDirection).normalize();
        const kicked = bricks.map((b) => {
          const c = new THREE.Vector3(b.position[0], b.position[1], b.position[2]).normalize();
          const dir = cam.clone().multiplyScalar(-0.65).add(c.multiplyScalar(0.35)).normalize();
          const intensity = 0.7 + (b.damage || 0) * 0.25;
          return {
            ...b,
            position: [
              Math.round(b.position[0] + dir.x * intensity + (Math.random() - 0.5) * 1.2),
              Math.max(0, Math.round(b.position[1] + Math.random() * 1.4)),
              Math.round(b.position[2] + dir.z * intensity + (Math.random() - 0.5) * 1.2)
            ],
            rotation: (b.rotation || 0) + (Math.random() - 0.5) * 0.6,
            damage: (b.damage || 0) + 1
          };
        });
        updateBricks(kicked, 'punch');
      };

      const saveProject = () => {
        const payload = { bricks, savedAt: new Date().toISOString(), version: 2 };
        localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
        downloadFile(JSON.stringify(payload, null, 2), 'lego-project.json', 'application/json');
      };
      const reloadProject = () => {
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (!raw) return alert('No saved project found on this device yet.');
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed.bricks)) return alert('Saved project is invalid.');
          const hydrated = parsed.bricks.map((b) => ({ ...b, id: b.id || generateId(), type: b.type || '1x1', rotation: b.rotation || 0, damage: b.damage || 0, material: b.material || 'plastic' }));
          setBricks(hydrated);
          setHistory([hydrated]);
          setFuture([]);
        } catch (_) {
          alert('Unable to load saved project.');
        }
      };

      const loadPreset = (name) => {
        updateBricks((PRESETS[name] || []).map((b) => ({ ...b, id: generateId(), damage: 0 })), 'snap');
        setToast(name === 'Empty Grid' ? 'Grid cleared.' : `${name} loaded.`);
      };

      const exportMesh = (format) => {
        const geometry = buildMergedGeometry(bricks);
        if (!geometry) return alert('Nothing to export yet. Add bricks first!');
        geometry.computeVertexNormals();
        const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial());
        if (format === 'stl') {
          const exporter = new STLExporter();
          const data = exporter.parse(mesh, { binary: true });
          downloadFile(new Blob([data], { type: 'model/stl' }), `lego-build-${Date.now()}.stl`);
        } else {
          const exporter = new OBJExporter();
          const data = exporter.parse(mesh);
          downloadFile(data, `lego-build-${Date.now()}.obj`, 'text/plain');
        }
      };

      return (
        <div className="w-full h-full relative overflow-hidden bg-slate-100 text-slate-800">
          <Canvas shadows dpr={[1, Math.min(2, window.devicePixelRatio || 1.5)]} gl={{ preserveDrawingBuffer: true }} camera={{ position: [8, 8, 8], fov: 45 }} onPointerUp={commitMove}>
            <SceneContent
              bricks={bricks}
              mode={mode}
              hoverPos={hoverPos}
              setHoverPos={setHoverPos}
              addBrick={addBrick}
              removeBrick={removeBrick}
              moveBrick={moveBrick}
              activeColor={activeColor}
              activeBrickType={activeBrickType}
              rotation={rotation}
              screenshotTrigger={screenshotTrigger}
              onScreenshotTaken={() => setScreenshotTrigger(false)}
              onCameraDirection={setCameraDirection}
              canPlaceCurrent={canPlaceCurrent}
            />
          </Canvas>

          {showIntro && (
            <div className="absolute inset-0 z-50 bg-slate-950/70 flex items-center justify-center p-4">
              <div className="w-full max-w-md rounded-3xl bg-white p-5 shadow-2xl">
                <h2 className="text-2xl font-black">Start Building in 3 seconds</h2>
                <ul className="mt-3 space-y-2 text-sm">
                  <li>👆 <strong>Tap to place</strong> a brick where the ghost appears.</li>
                  <li>🖐️ <strong>Move mode + drag</strong> to reposition a brick.</li>
                  <li>🧭 <strong>Drag background</strong> to orbit camera.</li>
                </ul>
                <button
                  className="mt-4 w-full min-h-[48px] rounded-2xl bg-blue-600 text-white font-bold"
                  onClick={() => { localStorage.setItem(INTRO_KEY, '1'); setShowIntro(false); }}
                >
                  🚀 Start Building
                </button>
              </div>
            </div>
          )}

          <div className="absolute top-2 left-2 right-2 z-30 pointer-events-none">
            <div className="pointer-events-auto bg-white/92 backdrop-blur rounded-2xl shadow px-2 py-2 flex flex-wrap gap-2 items-center justify-center md:justify-start max-h-[44vh] overflow-y-auto">
              <button className={`min-h-[44px] px-3 rounded-xl ${mode === 'build' ? 'bg-blue-600 text-white' : 'bg-slate-100'}`} onClick={() => setMode('build')}>Build</button>
              <button className={`min-h-[44px] px-3 rounded-xl ${mode === 'move' ? 'bg-blue-600 text-white' : 'bg-slate-100'}`} onClick={() => setMode('move')}>Move</button>
              <button className={`min-h-[44px] px-3 rounded-xl ${mode === 'delete' ? 'bg-blue-600 text-white' : 'bg-slate-100'}`} onClick={() => setMode('delete')}>Delete</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-slate-100" onClick={() => setRotation((r) => r + Math.PI / 2)}>Rotate</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-slate-100" onClick={undo}>Undo</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-slate-100" onClick={redo}>Redo</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-orange-100" onClick={punchAll}>Punch All</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-slate-100" onClick={() => setScreenshotTrigger(true)}>Export Screenshot</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-slate-100" onClick={() => exportMesh('stl')}>Export STL</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-slate-100" onClick={() => exportMesh('obj')}>Export OBJ</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-slate-100" onClick={saveProject}>Save + JSON</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-slate-100" onClick={reloadProject}>Reload Save</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-slate-100" onClick={() => loadPreset('Cozy House')}>Load Preset</button>
              <button className="min-h-[44px] px-3 rounded-xl bg-red-100" onClick={() => loadPreset('Empty Grid')}>Clear</button>
              <label className="min-h-[44px] px-3 rounded-xl bg-slate-100 flex items-center gap-2">
                Material
                <select className="rounded-lg bg-white px-2 py-1" value={activeMaterial} onChange={(e) => setActiveMaterial(e.target.value)}>
                  <option value="plastic">Plastic</option>
                  <option value="wood">Wood</option>
                  <option value="metal">Metal</option>
                </select>
              </label>
              <label className="min-h-[44px] px-3 rounded-xl bg-slate-100 flex items-center gap-2">
                <input type="checkbox" checked={soundEnabled} onChange={(e) => setSoundEnabled(e.target.checked)} />
                Sound
              </label>
            </div>
          </div>

          <div className="absolute left-2 bottom-[124px] z-30 pointer-events-none max-w-xs">
            <div className="pointer-events-auto bg-slate-900/88 text-white rounded-2xl p-3 shadow-lg">
              <p className="text-xs uppercase tracking-wide text-slate-300">Objective</p>
              <p className="text-sm font-semibold">{objectiveLabel}</p>
              <div className="mt-2 h-2 rounded-full bg-slate-700 overflow-hidden">
                <div className="h-full bg-emerald-400 transition-all" style={{ width: `${objectiveProgress}%` }} />
              </div>
              <p className="mt-2 text-xs text-slate-200">Mode: <strong>{mode}</strong>{mode === 'build' && !canPlaceCurrent ? ' • blocked position' : ''}</p>
              {!!toast && <p className="mt-1 text-xs text-amber-300">{toast}</p>}
            </div>
          </div>

          <div className="absolute bottom-2 left-2 right-2 z-30 pointer-events-none safe-inset">
            <div className="pointer-events-auto bg-white/92 backdrop-blur rounded-2xl shadow p-2 grid grid-cols-6 sm:grid-cols-8 md:grid-cols-12 gap-2">
              {PALETTE.map((c) => (
                <button key={c} className={`w-full min-h-[44px] rounded-xl border-2 ${activeColor === c ? 'border-black' : 'border-white'}`} style={{ backgroundColor: c }} onClick={() => setActiveColor(c)} />
              ))}
            </div>
            <div className="pointer-events-auto mt-2 bg-white/92 backdrop-blur rounded-2xl shadow p-2 grid grid-cols-3 sm:grid-cols-5 gap-2">
              {BRICK_TYPES.map((t) => (
                <button key={t.id} onClick={() => setActiveBrickType(t.id)} className={`w-full min-h-[44px] rounded-xl px-2 ${activeBrickType === t.id ? 'bg-blue-600 text-white' : 'bg-slate-100'}`}>
                  {t.emoji} {t.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

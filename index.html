<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BrickBuilder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.154.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.13.0?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.74.0?external=react,react-dom,three,@react-three/fiber",
        "three/examples/jsm/exporters/STLExporter.js": "https://esm.sh/three@0.154.0/examples/jsm/exporters/STLExporter.js",
        "three/examples/jsm/exporters/OBJExporter.js": "https://esm.sh/three@0.154.0/examples/jsm/exporters/OBJExporter.js"
      }
    }
  </script>
  <style>
    html, body, #root { width: 100%; height: 100%; margin: 0; background: #0f172a; overflow: hidden; }
    * { box-sizing: border-box; }
    canvas { touch-action: none; }
    .tap-target { min-width: 44px; min-height: 44px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useEffect, useMemo, useRef, useState, Suspense, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Canvas, useFrame, useThree } from '@react-three/fiber';
    import { Environment, OrbitControls, RoundedBox } from '@react-three/drei';
    import * as THREE from 'three';
    import { STLExporter } from 'three/examples/jsm/exporters/STLExporter.js';
    import { OBJExporter } from 'three/examples/jsm/exporters/OBJExporter.js';

    const STORAGE_KEY = 'lego-project-v2';
    const ONBOARD_KEY = 'lego-onboard-seen-v2';
    const GRID_SIZE = 50;

    const PALETTE = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#a855f7', '#ec4899', '#f8fafc', '#334155'];
    const BRICK_TYPES = [
      { id: '1x1', w: 1, d: 1, label: '1x1' },
      { id: '1x2', w: 1, d: 2, label: '1x2' },
      { id: '2x2', w: 2, d: 2, label: '2x2' },
      { id: '2x4', w: 2, d: 4, label: '2x4' }
    ];
    const BY_ID = Object.fromEntries(BRICK_TYPES.map((t) => [t.id, t]));

    const id = () => (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));

    const normalizeRot = (r = 0) => ((Math.round(r / (Math.PI / 2)) % 4) + 4) % 4;
    const dim = (type, rot) => {
      const t = BY_ID[type] || BY_ID['1x1'];
      return normalizeRot(rot) % 2 ? { w: t.d, d: t.w } : { w: t.w, d: t.d };
    };
    const cells = (b) => {
      const { w, d } = dim(b.type, b.rotation);
      const out = [];
      for (let x = 0; x < w; x++) for (let z = 0; z < d; z++) out.push([b.position[0] + x, b.position[1], b.position[2] + z]);
      return out;
    };

    const canPlace = (all, candidate, ignoreId = null) => {
      const occ = new Set();
      all.forEach((b) => {
        if (b.id === ignoreId) return;
        cells(b).forEach(([x, y, z]) => occ.add(`${x},${y},${z}`));
      });
      return cells(candidate).every(([x, y, z]) => !occ.has(`${x},${y},${z}`));
    };

    const playMaterialSound = (type = 'plastic', volume = 0.06) => {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        const ctx = new AC();
        const now = ctx.currentTime;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        const noise = ctx.createBufferSource();
        const b = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
        const arr = b.getChannelData(0);
        for (let i = 0; i < arr.length; i++) arr[i] = (Math.random() * 2 - 1) * 0.35;
        noise.buffer = b;

        const freqs = { plastic: 380, wood: 260, metal: 520 };
        o.type = 'triangle';
        o.frequency.setValueAtTime(freqs[type] || freqs.plastic, now);
        g.gain.setValueAtTime(volume, now);
        g.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);

        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 1800;
        o.connect(g);
        noise.connect(lp);
        lp.connect(g);
        g.connect(ctx.destination);

        o.start(now); o.stop(now + 0.12);
        noise.start(now); noise.stop(now + 0.08);
      } catch {}
    };

    function Brick({ brick, mode, onDelete, onPickMove, onHover, selected }) {
      const { w, d } = dim(brick.type, brick.rotation);
      return (
        <group position={brick.position} rotation={[0, brick.rotation || 0, 0]}>
          <RoundedBox
            args={[w, Math.max(0.5, 1 - (brick.damage || 0) * 0.08), d]}
            radius={0.05}
            smoothness={3}
            position={[(w - 1) / 2, 0.5, (d - 1) / 2]}
            castShadow
            receiveShadow
            onPointerDown={(e) => {
              e.stopPropagation();
              if (mode === 'delete') onDelete(brick.id);
              if (mode === 'move') onPickMove(brick.id);
            }}
            onPointerMove={(e) => {
              e.stopPropagation();
              onHover(e);
            }}
          >
            <meshStandardMaterial
              color={selected ? '#facc15' : brick.color}
              roughness={0.45}
              metalness={0.12 + (brick.material === 'metal' ? 0.2 : 0)}
            />
          </RoundedBox>
        </group>
      );
    }

    function Scene({ state, setHoverPos, hoverPos, setSnapshotBricks, requestCapture, clearCapture, selectedId, setSelectedId }) {
      const { scene, camera, gl } = useThree();
      const punchVelRef = useRef({});

      useFrame((_, dt) => {
        state.bricks.forEach((b) => {
          if (!punchVelRef.current[b.id]) return;
          const v = punchVelRef.current[b.id];
          b.position[0] += v.x * dt;
          b.position[1] = Math.max(0, b.position[1] + v.y * dt);
          b.position[2] += v.z * dt;
          v.x *= 0.92; v.y *= 0.86; v.z *= 0.92;
          if (Math.abs(v.x) + Math.abs(v.y) + Math.abs(v.z) < 0.02) delete punchVelRef.current[b.id];
        });
      });

      useEffect(() => {
        if (!requestCapture) return;
        const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
        const size = new THREE.Vector2();
        gl.getSize(size);
        const w = Math.floor(size.x * dpr);
        const h = Math.floor(size.y * dpr);

        const target = new THREE.WebGLRenderTarget(w, h, { format: THREE.RGBAFormat });
        const prev = gl.getRenderTarget();
        gl.setRenderTarget(target);
        gl.render(scene, camera);

        const buf = new Uint8Array(w * h * 4);
        gl.readRenderTargetPixels(target, 0, 0, w, h, buf);
        gl.setRenderTarget(prev);
        target.dispose();

        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const img = ctx.createImageData(w, h);
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const src = ((h - y - 1) * w + x) * 4;
            const dst = (y * w + x) * 4;
            img.data[dst] = buf[src];
            img.data[dst + 1] = buf[src + 1];
            img.data[dst + 2] = buf[src + 2];
            img.data[dst + 3] = 255;
          }
        }
        ctx.putImageData(img, 0, 0);
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = 'lego-screenshot.png';
        a.click();
        clearCapture();
      }, [requestCapture]);

      const pointerToGrid = (e) => {
        const p = e.point;
        if (e.object.geometry?.type === 'PlaneGeometry') return [Math.round(p.x), 0, Math.round(p.z)];
        const n = e.face?.normal || new THREE.Vector3();
        const out = [Math.round(p.x + n.x * 0.5), Math.max(0, Math.floor(p.y + n.y * 0.5)), Math.round(p.z + n.z * 0.5)];
        return out;
      };

      const punchAll = () => {
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const base = dir.multiplyScalar(-6);
        const next = state.bricks.map((b) => ({ ...b, damage: Math.min(8, (b.damage || 0) + 1) }));
        next.forEach((b) => {
          punchVelRef.current[b.id] = {
            x: base.x + (Math.random() - 0.5) * 4,
            y: 2 + Math.random() * 3,
            z: base.z + (Math.random() - 0.5) * 4
          };
        });
        setSnapshotBricks(next, 'metal');
      };
      state.punchRef.current = punchAll;

      return (
        <>
          <ambientLight intensity={0.65} />
          <directionalLight position={[8, 14, 8]} castShadow intensity={1.1} />
          <Suspense fallback={null}><Environment preset="park" /></Suspense>

          {state.bricks.map((brick) => (
            <Brick
              key={brick.id}
              brick={brick}
              mode={state.mode}
              selected={selectedId === brick.id}
              onDelete={(id) => {
                setSelectedId(null);
                setSnapshotBricks(state.bricks.filter((b) => b.id !== id), 'wood');
              }}
              onPickMove={(id) => setSelectedId(id)}
              onHover={(e) => setHoverPos(pointerToGrid(e))}
            />
          ))}

          {state.mode === 'build' && hoverPos && (
            <group position={hoverPos}>
              <RoundedBox args={[dim(state.type, state.rotation).w, 1, dim(state.type, state.rotation).d]} radius={0.05} smoothness={3} position={[(dim(state.type, state.rotation).w - 1) / 2, 0.5, (dim(state.type, state.rotation).d - 1) / 2]}>
                <meshStandardMaterial color={state.color} opacity={0.45} transparent />
              </RoundedBox>
            </group>
          )}

          <mesh
            rotation={[-Math.PI / 2, 0, 0]}
            position={[0, -0.01, 0]}
            onPointerMove={(e) => setHoverPos(pointerToGrid(e))}
            onPointerDown={(e) => {
              if (!hoverPos) return;
              if (state.mode === 'build') {
                const c = { id: id(), position: hoverPos, color: state.color, rotation: state.rotation, type: state.type, material: 'plastic', damage: 0 };
                if (canPlace(state.bricks, c)) setSnapshotBricks([...state.bricks, c], 'plastic');
              }
              if (state.mode === 'move' && selectedId) {
                const src = state.bricks.find((b) => b.id === selectedId);
                if (!src) return;
                const moved = { ...src, position: hoverPos };
                if (canPlace(state.bricks, moved, src.id)) {
                  setSnapshotBricks(state.bricks.map((b) => (b.id === selectedId ? moved : b)), 'plastic');
                }
                setSelectedId(null);
              }
            }}
          >
            <planeGeometry args={[GRID_SIZE, GRID_SIZE]} />
            <meshStandardMaterial transparent opacity={0} />
          </mesh>

          <gridHelper args={[GRID_SIZE, GRID_SIZE, 0x64748b, 0x334155]} position={[0, 0.01, 0]} />
          <OrbitControls makeDefault minDistance={4} maxDistance={50} minPolarAngle={0.05} maxPolarAngle={Math.PI / 2 - 0.05} />
        </>
      );
    }

    function App() {
      const [bricks, setBricks] = useState([]);
      const [history, setHistory] = useState([[]]);
      const [historyIndex, setHistoryIndex] = useState(0);
      const [hoverPos, setHoverPos] = useState(null);
      const [mode, setMode] = useState('build');
      const [color, setColor] = useState(PALETTE[0]);
      const [type, setType] = useState(BRICK_TYPES[0].id);
      const [rotation, setRotation] = useState(0);
      const [selectedId, setSelectedId] = useState(null);
      const [capture, setCapture] = useState(false);
      const [showOnboard, setShowOnboard] = useState(false);
      const punchRef = useRef(() => {});

      useEffect(() => {
        const seen = localStorage.getItem(ONBOARD_KEY);
        if (!seen) setShowOnboard(true);
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          try {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed.bricks)) {
              setBricks(parsed.bricks);
              setHistory([parsed.bricks]);
              setHistoryIndex(0);
            }
          } catch {}
        }
      }, []);

      const setSnapshotBricks = useCallback((next, soundType = 'plastic') => {
        setBricks(next);
        setHistory((prev) => {
          const trimmed = prev.slice(0, historyIndex + 1);
          return [...trimmed, JSON.parse(JSON.stringify(next))];
        });
        setHistoryIndex((i) => i + 1);
        playMaterialSound(soundType, 0.05);
      }, [historyIndex]);

      const undo = () => {
        if (historyIndex <= 0) return;
        const nextIndex = historyIndex - 1;
        setHistoryIndex(nextIndex);
        setBricks(JSON.parse(JSON.stringify(history[nextIndex])));
      };

      const redo = () => {
        if (historyIndex >= history.length - 1) return;
        const nextIndex = historyIndex + 1;
        setHistoryIndex(nextIndex);
        setBricks(JSON.parse(JSON.stringify(history[nextIndex])));
      };

      const saveProject = () => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ bricks, savedAt: new Date().toISOString() }));
      };

      const reloadProject = () => {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed.bricks)) {
            setBricks(parsed.bricks);
            setHistory([parsed.bricks]);
            setHistoryIndex(0);
          }
        } catch {}
      };

      const exportModel = (format) => {
        const root = new THREE.Group();
        bricks.forEach((b) => {
          const { w, d } = dim(b.type, b.rotation);
          const g = new THREE.BoxGeometry(w, 1, d);
          g.translate((w - 1) / 2, 0.5, (d - 1) / 2);
          const m = new THREE.MeshStandardMaterial({ color: new THREE.Color(b.color) });
          const mesh = new THREE.Mesh(g, m);
          mesh.position.set(b.position[0], b.position[1], b.position[2]);
          mesh.rotation.y = b.rotation || 0;
          mesh.updateMatrixWorld(true);
          root.add(mesh);
        });

        let text = '';
        let blobType = 'text/plain';
        let file = 'lego-model';
        if (format === 'stl') {
          text = new STLExporter().parse(root, { binary: false });
          file += '.stl';
        } else {
          text = new OBJExporter().parse(root);
          file += '.obj';
        }
        const blob = new Blob([text], { type: blobType });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = file;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      const state = useMemo(() => ({ bricks, mode, color, type, rotation, punchRef }), [bricks, mode, color, type, rotation]);

      return (
        <div className="w-full h-full relative overflow-hidden text-slate-100">
          <Canvas camera={{ position: [8, 8, 10], fov: 45 }} dpr={[1, 2]} shadows>
            <Scene
              state={state}
              hoverPos={hoverPos}
              setHoverPos={setHoverPos}
              setSnapshotBricks={setSnapshotBricks}
              requestCapture={capture}
              clearCapture={() => setCapture(false)}
              selectedId={selectedId}
              setSelectedId={setSelectedId}
            />
          </Canvas>

          <div className="absolute inset-x-0 top-0 p-2 sm:p-3 z-10 pointer-events-none">
            <div className="pointer-events-auto bg-slate-900/75 rounded-2xl p-2 flex flex-wrap gap-2 items-center justify-center md:justify-between backdrop-blur">
              <div className="flex flex-wrap gap-2 justify-center">
                {['build', 'move', 'delete'].map((m) => (
                  <button key={m} className={`tap-target px-3 py-2 rounded-xl text-sm font-bold ${mode === m ? 'bg-blue-500' : 'bg-slate-700'}`} onClick={() => setMode(m)}>{m.toUpperCase()}</button>
                ))}
                <button className="tap-target px-3 py-2 rounded-xl bg-slate-700" onClick={() => setRotation((r) => r + Math.PI / 2)}>Rotate</button>
                <button className="tap-target px-3 py-2 rounded-xl bg-orange-600" onClick={() => punchRef.current()}>Punch All</button>
              </div>
              <div className="flex flex-wrap gap-2 justify-center">
                <button className="tap-target px-3 py-2 rounded-xl bg-slate-700" onClick={undo}>Undo</button>
                <button className="tap-target px-3 py-2 rounded-xl bg-slate-700" onClick={redo}>Redo</button>
                <button className="tap-target px-3 py-2 rounded-xl bg-slate-700" onClick={saveProject}>Save</button>
                <button className="tap-target px-3 py-2 rounded-xl bg-slate-700" onClick={reloadProject}>Reload</button>
                <button className="tap-target px-3 py-2 rounded-xl bg-slate-700" onClick={() => exportModel('stl')}>Export STL</button>
                <button className="tap-target px-3 py-2 rounded-xl bg-slate-700" onClick={() => exportModel('obj')}>Export OBJ</button>
                <button className="tap-target px-3 py-2 rounded-xl bg-emerald-700" onClick={() => setCapture(true)}>Export Screenshot</button>
              </div>
            </div>
          </div>

          <div className="absolute inset-x-0 bottom-0 p-2 sm:p-3 z-10 pointer-events-none">
            <div className="pointer-events-auto bg-slate-900/75 rounded-2xl p-2 flex flex-col gap-2 backdrop-blur max-w-full">
              <div className="flex flex-wrap gap-2 justify-center">
                {BRICK_TYPES.map((t) => (
                  <button key={t.id} className={`tap-target px-3 py-2 rounded-xl border ${type === t.id ? 'bg-cyan-500 border-cyan-300' : 'bg-slate-700 border-slate-500'}`} onClick={() => setType(t.id)}>{t.label}</button>
                ))}
              </div>
              <div className="flex flex-wrap gap-2 justify-center">
                {PALETTE.map((c) => (
                  <button key={c} className={`tap-target w-11 h-11 rounded-xl border-2 ${color === c ? 'border-white scale-110' : 'border-transparent'}`} style={{ background: c }} onClick={() => setColor(c)} aria-label={c} />
                ))}
              </div>
            </div>
          </div>

          {showOnboard && (
            <div className="absolute inset-0 z-20 bg-slate-950/80 flex items-center justify-center p-4">
              <div className="max-w-md w-full bg-white text-slate-900 rounded-3xl p-5">
                <h1 className="text-2xl font-extrabold">Start Building</h1>
                <ul className="mt-3 text-sm space-y-2">
                  <li>👉 Tap the ground to place a brick.</li>
                  <li>✋ Choose Move mode, tap brick, tap ground to move.</li>
                  <li>🧨 Punch All for quick physics fun.</li>
                </ul>
                <button
                  className="mt-4 w-full tap-target py-3 rounded-2xl bg-blue-600 text-white font-bold"
                  onClick={() => {
                    localStorage.setItem(ONBOARD_KEY, '1');
                    setShowOnboard(false);
                  }}
                >
                  Start Building
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
